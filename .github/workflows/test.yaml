name: tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Read-only by default. This workflow never writes back to the repo —
# badges are served directly by shields.io from public GitHub APIs and
# pkg.go.dev, and coverage is written to a public gist via
# schneegans/dynamic-badges-action (using GIST_TOKEN, a PAT with `gist`
# scope — not a GITHUB_TOKEN, so it doesn't touch the repo at all).
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          # golangci-lint-action@v7 is required to run golangci-lint v2.
          # v6 of the action only supports v1 binaries and fails with
          # "golangci-lint v2 is not supported by golangci-lint-action
          # v6, you must update to golangci-lint-action v7" when asked
          # for a v2 version. The .golangci.yml in this repo uses the
          # v2 config schema (`version: "2"`), which v1 binaries
          # rejected with "the configuration contains invalid elements".
          # Pin v2.0.2 to match the rest of the bold-minds family.
          version: v2.0.2
          args: --timeout=10m

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        go-version: [ '1.21', 'stable' ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install dependencies
        run: go mod download

      # Build validation (cross-platform).
      # Conditionally diffs go.sum only if present — pure-stdlib children have none.
      - name: Build validation
        shell: bash
        run: |
          go build ./...
          go mod tidy
          git diff --exit-code go.mod
          if [ -f go.sum ]; then
            git diff --exit-code go.sum
          fi

      # Split Unix and Windows runs because PowerShell's default argument
      # parsing splits `./...` into `./...` and `.out` (treating the
      # trailing `.out` from `coverage.out` as a separate package path),
      # which then fails with `FAIL .out [setup failed]` even though all
      # the real tests pass. Quoting the coverprofile argument avoids the
      # split on Windows; the rest of the bold-minds family also drops
      # `-race` on Windows because the quoted form has subtle interaction
      # issues with the race detector's instrumentation on pwsh.
      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: go test -v -coverprofile="coverage.out" ./...

      - name: Run benchmarks
        run: go test -bench=. -benchmem ./...

      # Coverage badge: on a successful push to main from ubuntu-latest only,
      # extract the total coverage percent from coverage.out and write it to
      # the repo's public gist via schneegans/dynamic-badges-action. shields.io
      # reads the gist via endpoint= mode. Requires GIST_TOKEN repo secret
      # (gist scope only). PRs and Windows/macOS runs skip this step.
      - name: Extract coverage percent
        id: coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%",""); print $3}')
          echo "pct=$pct" >> "$GITHUB_OUTPUT"

      - name: Update coverage badge gist
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == 'stable' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.8.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 44ed073eefff41adcb04961aef888e84
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: 50
          maxColorRange: 95
